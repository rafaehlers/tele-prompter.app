server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: rotas do cliente caem no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # assets com hash no nome → cache longo
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
